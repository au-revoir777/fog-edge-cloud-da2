version: '3.9'
services:
  influxdb:
    image: influxdb:2.7
    ports: ["8086:8086"]
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminadmin
      - DOCKER_INFLUXDB_INIT_ORG=hospital
      - DOCKER_INFLUXDB_INIT_BUCKET=resp
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=token123
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=resp
      - POSTGRES_PASSWORD=resp
      - POSTGRES_DB=resp
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883", "8883:8883"]
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    depends_on: [influxdb, postgres, redis]
